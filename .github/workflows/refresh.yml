# Daily cloud refresh of the ODL PM dashboard -- no laptop required.
# Rebuilds data.json + index.html from the live Capacity Allocations Sheet (Google
# Drive, via a service account) and the Asana snapshot (read from the odl-estimator
# repo, which self-refreshes nightly), then commits the result back to this repo.
#
# One-time setup -- Repo -> Settings -> Secrets and variables -> Actions:
#   GDRIVE_SA_KEY        the service-account JSON key (must be shared Viewer on the
#                        Capacity Allocations Sheet AND the Reflection folder). See
#                        fetch_drive.py.
#   ESTIMATOR_REPO_TOKEN a GitHub PAT (fine-grained, read access to jliu234-cell/
#                        odl-estimator) so this job can check out its data_all.
#                        (Not needed if odl-estimator is public -- then drop the
#                        `token:` line below.)
# Then: Actions tab -> dashboard-refresh -> "Run workflow" to test.
name: dashboard-refresh

on:
  schedule:
    - cron: "0 13 * * *"     # 13:00 UTC -- after the estimator's 11:30 UTC Asana pull finishes
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # to commit the refreshed data.json / index.html

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    # Only the live builder repo has the GDRIVE_SA_KEY secret and runs the
    # nightly rebuild. Publishing is decoupled: ND-Learning/PMdashboard-site
    # runs encrypt-and-publish on its own cron and fetches whatever this repo
    # last built -- so this workflow just rebuilds, commits, and stops.
    if: github.repository == 'jliu234-cell/odl-pm-dashboard'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the dashboard
        uses: actions/checkout@v4

      - name: Check out odl-estimator (for the fresh Asana snapshot)
        # data_all includes status_updates.csv (weekly Asana status updates that
        # power the "projects at risk" panel), same as the other Asana CSVs.
        uses: actions/checkout@v4
        with:
          repository: jliu234-cell/odl-estimator   # public, so the default token can read it
          path: _estimator
          sparse-checkout: data_all

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Fetch the capacity sheet + reflections from Google Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: python3 fetch_drive.py _sources

      - name: Rebuild the dashboard
        env:
          ODL_ASANA_DIR: ${{ github.workspace }}/_estimator/data_all
          ODL_REFLECTION_DIR: ${{ github.workspace }}/_sources/Reflection
        run: |
          # Build from the freshly-fetched Capacity Allocations sheet when the Drive
          # pull succeeded (fetch_drive.py writes it to _sources/); otherwise leave
          # ODL_CAPACITY_CSV unset so build.py falls back to the committed CSV. The
          # raw sheet is used for the build but NOT committed -- only the already-
          # committed data.json / index.html change (now carrying live capacity).
          CAP="${{ github.workspace }}/_sources/capacity_allocations.csv"
          if [ -s "$CAP" ]; then
            echo "Building from the freshly-fetched capacity sheet ($(wc -c < "$CAP") bytes)."
            export ODL_CAPACITY_CSV="$CAP"
          else
            echo "No fetched capacity sheet; using the committed capacity_allocations.csv."
          fi
          python3 build.py

      - name: Commit & push the refreshed dashboard
        run: |
          git config user.name  "odl-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json index.html statuses.json
          if git diff --cached --quiet; then
            echo "Nothing changed -- skipping commit."
          else
            git commit -m "dashboard refresh $(date -u +%F)"
            git push
          fi
          # No publish step here: ND-Learning/PMdashboard-site's encrypt-and-publish
          # cron picks up this commit and serves the StatiCrypt-encrypted page.
