  const noKC=reports.filter(r=>!(r.key_considerations&&r.key_considerations.length));
  if(noKC.length)c.appendChild(el("div",{class:"muted small",style:"margin-top:8px",html:
    `Reports with no explicit retrospective / considerations section: ${noKC.map(r=>r.drive_url?`<a class="src" href="${esc(r.drive_url)}" target="_blank" rel="noopener">${esc(r.project)}</a>`:esc(r.project)).join(" · ")}.`}));
}
function kpiCard(k,v,d,col){const e=el("div",{class:"card kpi"});e.innerHTML=`<div class="k">${esc(k)}</div><div class="v" ${col?`style="color:${col}"`:""}>${v}</div><div class="d">${esc(d||"")}</div>`;return e;}
function filterSelect(key,label,opts){
  const wrap=el("span");wrap.appendChild(el("label",{},label));
  const s=el("select");s.innerHTML=opts.map(o=>`<option value="${esc(o)}" ${state.recFilter[key]===o?"selected":""}>${o==="all"?"All":esc(key==="category"&&typeof CATLABEL!=="undefined"?(CATLABEL[o]||o):o)}</option>`).join("");
  s.onchange=e=>{state.recFilter[key]=e.target.value;drawRecList();};wrap.appendChild(s);return wrap;
}
function drawRecList(){
  const f=state.recFilter; let list=recs();
  list=list.filter(r=>(f.status==="all"||r.status===f.status)&&(f.category==="all"||r.category===f.category)
    &&(f.severity==="all"||r.severity===f.severity)
    &&(!f.q||((r.title+" "+(r.detail||"")+" "+(r.scope||"")).toLowerCase().includes(f.q.toLowerCase()))));
  const SEV={high:0,medium:1,low:2},ST={"Not Started":0,"In Progress":1,"Achieved":3,"Dismissed":4};
  list.sort((a,b)=>(ST[a.status]-ST[b.status])||(SEV[a.severity]-SEV[b.severity])||a.title.localeCompare(b.title));
  const wrap=$("#recList");wrap.innerHTML="";
  if(!list.length){wrap.innerHTML=`<div class="muted" style="padding:20px">No recommendations match.</div>`;return;}
  list.forEach(r=>wrap.appendChild(recCard(r)));
}
const CATICON={"capacity-team":"⚖️","capacity-person":"🧑","capacity-unstaffed":"🪑","post-project":"📝","on-hold":"⏸️","calibration":"🎯","data-hygiene":"🧹","data-quality":"🔍","faculty-feedback":"💬","manual":"✍️"};
const CATLABEL={"capacity-team":"Capacity — team","capacity-person":"Capacity — person","capacity-unstaffed":"Unstaffed work","post-project":"Post-project report","on-hold":"On hold","calibration":"Estimation","data-hygiene":"Data hygiene","data-quality":"Data quality","faculty-feedback":"From a reflection report","manual":"Manual"};
const STATUS_LABEL={"Not Started":"To do","In Progress":"In progress","Achieved":"Done","Dismissed":"Won't do"};
const RECOPEN={};  // remembers which rec cards are expanded across re-renders
function recCard(r){
  // read what to improve; when the team acts on it, mark it + add a note (simple,
  // clearly-labelled — no owner/target/evidence clutter).
  const card=el("div",{class:"rec sev-"+r.severity+(RECOPEN[r.id]?" open":"")});
  const st=r.status||"Not Started";
  const showPill=true;   // always show the STATUS (To do / In progress / Done) — not an abstract severity
  card.innerHTML=`<div class="rhd">
     <span class="ico">${CATICON[r.category]||"•"}</span>
     <div style="flex:1">
       <div class="rtitle">${esc(r.title)}</div>
       ${r.scope&&r.scope_type!=="global"?`<div class="rmeta"><b>${esc(r.scope)}</b></div>`:""}
     </div>
     ${showPill?`<span class="pill ${statusPill(st)}">${esc(STATUS_LABEL[st]||st)}</span>`:""}
     <span class="caret" aria-hidden="true">▸</span>
   </div>
   <div class="rbody">
     <p style="margin:8px 0 0">${esc(r.detail||"")}</p>
     ${r.suggested_action?`<div class="actionline"><b>What to do:</b> ${esc(r.suggested_action)}</div>`:""}
     ${r.doc_url?`<div class="small" style="margin:8px 0 0"><a href="${esc(r.doc_url)}" target="_blank" rel="noopener">${/asana\.com/.test(r.doc_url)?"↗ Open the project in Asana":"📄 Open the reflection report ↗"}</a></div>`:""}
     <div class="track">
       <div class="tlabel">Have we acted on this?</div>
       <div class="statusbar" data-id="${esc(r.id)}">
         ${[["Not Started","To do"],["In Progress","In progress"],["Achieved","Done"]].map(([v,lab])=>`<button data-s="${v}" class="${st===v?"on "+v.split(" ")[0].slice(0,3):""}">${lab}</button>`).join("")}
       </div>
       <label class="tnote">Notes — what we did or decided
         <textarea data-fld="notes" rows="2" placeholder="e.g. raised at the 7/1 meeting; a teammate is taking it on">${esc(r.notes||"")}</textarea>
       </label>
       ${r.updated_at?`<div class="muted small" style="margin-top:5px">Updated ${esc(r.updated_at)}${r.updated_by?" by "+esc(r.updated_by):""}</div>`:""}
     </div>
   </div>`;
  card.querySelector(".rhd").onclick=()=>{const willOpen=!card.classList.contains("open");card.classList.toggle("open");RECOPEN[r.id]=willOpen;};
  card.querySelectorAll(".statusbar button").forEach(b=>b.onclick=ev=>{
    ev.stopPropagation(); ensureUser();
    saveRec(r.id,{status:b.getAttribute("data-s")}); render();   // RECOPEN keeps this card open
  });
  card.querySelectorAll("[data-fld]").forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onchange=()=>{ensureUser();saveRec(r.id,{[inp.getAttribute("data-fld")]:inp.value});};
  });
  return card;
}
function ensureUser(){if(!LS.user()){const u=prompt("Your name or initials (saved for the 'updated by' field):","");if(u)LS.setUser(u.trim());}}
function showAddForm(){
  const p=$("#addPanel");p.classList.remove("hide");
  p.innerHTML=`<div class="hd"><h2>Add a manual recommendation</h2></div><div class="bd">
    <div class="editrow"><div><label>Title *</label><input type="text" id="naTitle"></div>
      <div><label>Severity</label><select id="naSev"><option>medium</option><option>high</option><option>low</option></select></div>
      <div><label>Scope type</label><select id="naST"><option>global</option><option>team</option><option>person</option><option>project</option></select></div>
      <div><label>Scope</label><input type="text" id="naScope" placeholder="e.g. Media / a teammate / project"></div></div>
    <div class="editrow" style="grid-template-columns:1fr"><div><label>Detail</label><textarea id="naDetail" rows="2"></textarea></div></div>
    <div class="editrow" style="grid-template-columns:1fr"><div><label>Suggested action</label><input type="text" id="naAction"></div></div>
    <div style="margin-top:10px;display:flex;gap:8px"><button class="btn gold" id="naSave">Add</button><button class="btn ghost" id="naCancel">Cancel</button></div>
    <div class="muted small" style="margin-top:6px">Manual recommendations are stored in this browser. Use “Export status” + the <code>recommendations_manual.json</code> file to share them with the team.</div></div>`;
  $("#naCancel").onclick=()=>p.classList.add("hide");
  $("#naSave").onclick=()=>{
    const title=$("#naTitle").value.trim();if(!title){alert("Title required");return;}
    const id="manual-"+title.toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,48)+"-"+Math.random().toString(36).slice(2,6);
    const rec={id,title,severity:$("#naSev").value,scope_type:$("#naST").value,scope:$("#naScope").value,
      detail:$("#naDetail").value,suggested_action:$("#naAction").value,source:"manual",category:"manual"};
    const m=LS.manual();m.push(rec);LS.setManual(m);p.classList.add("hide");render();
  };
}
function exportStatuses(){
  // build statuses.json: every rec id -> tracked fields (baked + local edits)
  const out={};
  recs().forEach(r=>{out[r.id]={status:r.status,owner:r.owner||"",target_month:r.target_month||"",
    notes:r.notes||"",evidence_url:r.evidence_url||"",updated_at:r.updated_at||"",updated_by:r.updated_by||"",
    first_seen:r.first_seen||TODAY};});
  download("statuses.json",JSON.stringify(out,null,1));
  // also export any locally-added manual recs if present
  const localManual=LS.manual();
  if(localManual.length){
    const baked=new Set(D.recommendations.filter(r=>r.source==="manual").map(r=>r.id));
    const merged=D.recommendations.filter(r=>r.source==="manual").map(r=>({id:r.id,title:r.title,detail:r.detail,severity:r.severity,category:r.category,scope_type:r.scope_type,scope:r.scope,suggested_action:r.suggested_action,metric:r.metric}))
      .concat(localManual.filter(r=>!baked.has(r.id)));
    setTimeout(()=>download("recommendations_manual.json",JSON.stringify(merged,null,1)),350);
  }
}
function importStatuses(){
  const inp=el("input",{type:"file",accept:"application/json"});
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const fr=new FileReader();
    fr.onload=()=>{try{const obj=JSON.parse(fr.result);let n=0;
      for(const id in obj){LS.setEdit(id,obj[id]);n++;}alert(`Imported ${n} statuses into this browser.`);render();}
      catch(err){alert("Could not parse JSON: "+err);}};fr.readAsText(file);};
  inp.click();
}
function download(name,text){const b=new Blob([text],{type:"application/json"});const u=URL.createObjectURL(b);
  const a=el("a",{href:u,download:name});document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}

/* ===================================================================== */
/*  DRAWER                                                              */
/* ===================================================================== */
let _drawerReturnFocus=null;
function drawer(title,subtitle,bodyHtml){
  const d=$("#drawer");
  _drawerReturnFocus=document.activeElement;
  d.innerHTML=`<div class="dhd"><div style="flex:1"><h2 id="drawerTitle">${esc(title)}</h2><div class="small" style="color:#c8d2e0">${subtitle||""}</div></div><button class="x" aria-label="Close" onclick="closeDrawer()">×</button></div><div class="dbd">${bodyHtml}</div>`;
  d.classList.add("show");$("#drawerBg").classList.add("show");
  d.focus();
}
function closeDrawer(){
  $("#drawer").classList.remove("show");$("#drawerBg").classList.remove("show");
  if(_drawerReturnFocus&&_drawerReturnFocus.focus){_drawerReturnFocus.focus();_drawerReturnFocus=null;}
}
window.closeDrawer=closeDrawer;
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeDrawer();
  // simple focus trap while the drawer is open
  if(e.key==="Tab"){const d=$("#drawer");if(!d.classList.contains("show"))return;
    const f=d.querySelectorAll('a[href],button,input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!f.length)return;const first=f[0],last=f[f.length-1];
    if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
    else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}}
});

function buildMonthPickers(){
  const f=$("#fromMonth"),t=$("#toMonth");
  f.innerHTML=MONTHS.map((m,i)=>`<option value="${i}" ${i===state.from?"selected":""}>${mlabFull(m)}</option>`).join("");
  t.innerHTML=MONTHS.map((m,i)=>`<option value="${i}" ${i===state.to?"selected":""}>${mlabFull(m)}</option>`).join("");
  f.onchange=e=>{state.from=clampIdx(+e.target.value);if(state.from>state.to)state.to=state.from;buildMonthPickers();render();};
  t.onchange=e=>{state.to=clampIdx(+e.target.value);if(state.to<state.from)state.from=state.to;buildMonthPickers();render();};
}
function boot(){
  $("#prov").innerHTML=`Capacity: <a class="src" href="${esc(CAP_URL)}" target="_blank" rel="noopener">Capacity Allocations sheet ↗</a> · projects from Asana + the capacity sheet · Plan-tab ranges from the estimator's calibration<br>Asana snapshot: ${esc(D.meta.asana_snapshot_date||"n/a")} · built ${esc((D.meta.generated_at||"").slice(0,10))}`;
  $("#foot").innerHTML=`ODL Capacity &amp; Performance · capacity from the Capacity Allocations sheet + Asana snapshot (${esc(D.meta.asana_snapshot_date||"")}) · hours-based (1 point = ${PH}h).`;
  $$("#unitSeg button").forEach(b=>b.onclick=()=>{state.unit=b.getAttribute("data-u");$$("#unitSeg button").forEach(x=>x.classList.toggle("active",x===b));render();});
  $("#btnRefresh").onclick=()=>tryLive(true);
  $("#btnSync").onclick=()=>syncAsana();
  setLiveBadge();
  buildMonthPickers();
  if(PUB){
    document.body.insertAdjacentHTML("afterbegin",`<div class="pubbanner">🔒 Public view — individual names, faculty details, per-person timesheet and internal links are redacted. Team &amp; portfolio figures only.</div>`);
    ["#btnRefresh","#btnSync"].forEach(s=>{const e=$(s);if(e)e.style.display="none";});
  }
  const h=location.hash.slice(1);if(TABS.some(t=>t[0]===h)&&!(PUB&&h==="faculty"))state.tab=h;
  render();
  // upgrade the baked snapshot to live numbers when a local server is present;
  // silently keeps the snapshot when opened as a plain file (offline). The
  // public build is a static snapshot only — no live server, so skip it.
  if(!PUB)tryLive(false);
}
boot();
</script>
