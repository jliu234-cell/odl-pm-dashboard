<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ODL Capacity &amp; Performance</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%230C2340'/%3E%3Crect x='15' y='39' width='34' height='15' rx='2' fill='%23C99700'/%3E%3Cpath d='M18 40a14 14 0 0 1 28 0z' fill='%23C99700'/%3E%3Crect x='30.7' y='15' width='2.6' height='7' fill='%23C99700'/%3E%3Ccircle cx='32' cy='12' r='3.2' fill='%23C99700'/%3E%3C/svg%3E">
<style>
  :root{
    --navy:#0c2340; --navy2:#13315c; --gold:#ae9142; --gold2:#c9b079;
    --ink:#1b2330; --muted:#5b6573; --line:#e4e7ec; --bg:#f4f6f9; --card:#fff;
    --green:#1f9d57; --greenbg:#e6f6ec; --amber:#d98b14; --amberbg:#fdf2dd;
    --red:#cf3a3a; --redbg:#fbe6e6; --blue:#3a78c2; --bluebg:#e7f0fb;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
  a{color:var(--navy2)}
  button{font:inherit;cursor:pointer}
  .wrap{max-width:1280px;margin:0 auto;padding:0 18px}

  header.top{background:linear-gradient(100deg,var(--navy),var(--navy2));color:#fff}
  .top .wrap{display:flex;align-items:center;gap:18px;padding:14px 18px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column}
  .brand h1{font-size:18px;color:#fff}
  .brand .sub{font-size:12px;color:#c8d2e0}
  .top .spacer{flex:1}
  .prov{font-size:11px;color:#aebdd1;text-align:right;line-height:1.5}
  .chip-model{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    color:#fff;border-radius:20px;padding:5px 11px;font-size:11.5px;font-weight:600;white-space:nowrap}

  nav.tabs{background:var(--navy);position:sticky;top:0;z-index:30;box-shadow:var(--shadow)}
  nav.tabs .wrap{display:flex;gap:2px;overflow-x:auto}
  nav.tabs button{background:none;border:0;color:#c8d2e0;padding:11px 15px;font-size:13.5px;
    font-weight:600;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button:hover{color:#fff}
  nav.tabs button.active{color:#fff;border-bottom-color:var(--gold)}
  nav.tabs .badge{display:inline-block;min-width:18px;padding:0 5px;margin-left:5px;border-radius:10px;
    background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;text-align:center}

  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:16px 0}
  .toolbar label{font-size:12px;color:var(--muted);font-weight:600;margin-right:4px}
  select,input[type=text],input[type=url],input[type=number],textarea{
    font:inherit;border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff;color:var(--ink)}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--gold2);outline-offset:0;border-color:var(--gold)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fff}
  .seg button{background:#fff;border:0;padding:6px 11px;font-size:12.5px;color:var(--muted);font-weight:600}
  .seg button.active{background:var(--navy);color:#fff}

  main{padding:6px 0 60px}
  section.tab{display:none}
  section.tab.active{display:block}
  .grid{display:grid;gap:16px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .kpi .v{font-size:27px;font-weight:700;margin-top:4px;letter-spacing:-.02em}
  .kpi .d{font-size:12px;color:var(--muted);margin-top:2px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin:16px 0;overflow:hidden}
  .panel>.hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .panel>.hd h2{font-size:15px}
  .panel>.hd .desc{font-size:12px;color:var(--muted);font-weight:500}
  .panel>.bd{padding:14px 16px;overflow-x:auto}
  .panel>.hd .spacer{flex:1}

  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.wrap td,table.wrap th{white-space:normal;overflow-wrap:anywhere;vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;
    background:#fff;cursor:pointer;user-select:none}
  th.nosort{cursor:default}
  tbody tr:hover{background:#f8fafc}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .hm td{padding:0;border:0}
  .hm .mcell{width:34px;height:30px;text-align:center;font-size:10.5px;border:1px solid #fff;
    color:#13233a;font-variant-numeric:tabular-nums}
  .hm .rowlab{padding:4px 9px;font-size:12px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--line)}
  .hm .mhdr{font-size:10px;color:var(--muted);text-align:center;padding:3px 0;font-weight:700;transform:rotate(0)}
  .clickable{cursor:pointer}

  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;line-height:1.6}
  .pill.green{background:var(--greenbg);color:#157a42}
  .pill.amber{background:var(--amberbg);color:#9a6206}
  .pill.red{background:var(--redbg);color:#b02a2a}
  .pill.blue{background:var(--bluebg);color:#2c5d97}
  .pill.gray{background:#eef1f4;color:#5b6573}
  .pill.navy{background:var(--navy);color:#fff}
  .sev-high{background:var(--redbg);color:#b02a2a}
  .sev-medium{background:var(--amberbg);color:#9a6206}
  .sev-low{background:#eef1f4;color:#5b6573}
  .pubbanner{background:#fff8e1;color:#7a5b00;border-bottom:1px solid #e6d5a8;padding:7px 14px;font-size:13px;text-align:center}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);align-items:center}
  .legend .sw{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:-2px}

  .bar-row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .bar-row .lab{width:64px;font-size:11.5px;color:var(--muted);text-align:right}
  .bar-track{flex:1;background:#eef1f4;border-radius:4px;height:16px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px}

  .rec{border:1px solid var(--line);border-left:4px solid var(--line);border-radius:10px;margin:10px 0;background:#fff;box-shadow:var(--shadow)}
  .rec.sev-high{border-left-color:var(--red)}
  .rec.sev-medium{border-left-color:var(--amber)}
  .rec.sev-low{border-left-color:var(--gold2)}
  .rec-group{margin:24px 0 8px;color:var(--navy);font-size:15px}
  .rec .rhd .caret{margin-left:auto;color:var(--muted);font-size:12px;align-self:center;transition:transform .15s}
  .rec.open .rhd .caret{transform:rotate(90deg)}
  .rec .track{margin-top:12px;padding-top:11px;border-top:1px dashed var(--line)}
  .rec .track .tlabel{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:7px}
  .rec .track .tnote{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-top:11px}
  .rec .track .tnote textarea{display:block;width:100%;margin-top:4px;font-weight:400;color:var(--ink);font-size:13px;
    border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;resize:vertical}
  .rec .rhd{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;cursor:pointer}
  .rec .rhd .ico{font-size:14px}
  .rec .rtitle{font-weight:650;font-size:14px}
  .rec .rmeta{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
  .rec .rbody{padding:0 14px 14px 14px;border-top:1px dashed var(--line);display:none}
  .rec.open .rbody{display:block}
  .rec .actionline{font-size:12.5px;color:#33414f;background:#f8fafc;border-left:3px solid var(--gold);
    padding:8px 10px;border-radius:0 6px 6px 0;margin:10px 0}
  .editrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
  .editrow label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:3px}
  .editrow input,.editrow select,.editrow textarea{width:100%}
  .statusbar{display:flex;gap:6px;flex-wrap:wrap}
  .statusbar button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600;color:var(--muted)}
  .statusbar button.on{color:#fff}
  .statusbar button.on.Not{background:#6b7280;border-color:#6b7280}
  .statusbar button.on.In{background:var(--blue);border-color:var(--blue)}
  .statusbar button.on.Ach{background:var(--green);border-color:var(--green)}
  .statusbar button.on.Dis{background:#9aa0aa;border-color:#9aa0aa}

  .btn{background:var(--navy);color:#fff;border:0;border-radius:7px;padding:8px 13px;font-size:13px;font-weight:600}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.gold{background:var(--gold);color:var(--navy)}
  .btn:disabled{opacity:.5;cursor:default}

  .drawer-bg{position:fixed;inset:0;background:rgba(10,20,40,.4);z-index:50;display:none}
  .drawer-bg.show{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(640px,94vw);background:#fff;z-index:51;
    box-shadow:-4px 0 24px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .22s ease;overflow:auto}
  .drawer.show{transform:translateX(0)}
  .drawer .dhd{position:sticky;top:0;background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px}
  .drawer .dhd h2{font-size:16px;color:#fff;flex:1}
  .drawer .dhd .x{background:none;border:0;color:#fff;font-size:22px;line-height:1}
  .drawer .dbd{padding:16px 18px}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:4px 12px;font-size:12.5px;margin:8px 0}
  .kv .k{color:var(--muted);font-weight:600}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .note{font-size:12px;color:var(--muted);background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin:10px 0}
  .src{font-size:11px;color:#5b6b7e;text-decoration:none;border-bottom:1px dotted #9aa7b4;white-space:nowrap}
  .src:hover{color:#0c2340;border-bottom-color:currentColor}
  .gantt{display:flex;height:24px;border-radius:5px;overflow:hidden;background:#eef1f4;min-width:280px}
  .gantt .seg{height:100%;overflow:hidden;border:0;border-radius:0;display:block}
  .gantt-legend{display:flex;flex-wrap:wrap;gap:7px 16px;margin-top:9px;font-size:12px}
  .gantt-legend .gl{display:inline-flex;align-items:center;gap:6px;color:var(--ink)}
  .gantt-legend .gl .gsw{width:11px;height:11px;border-radius:3px;flex:none}
  .gantt-legend .gl .gm{color:var(--muted)}
  footer{color:var(--muted);font-size:11.5px;text-align:center;padding:24px}
  .hide{display:none !important}
  .livewrap{display:flex;align-items:center;gap:6px}
  .livewrap .btn{padding:4px 9px;font-size:11.5px}
  #liveBadge{cursor:default;white-space:nowrap}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);
    background:#13233a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;
    box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:80;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .subseg{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .subseg button{background:#fff;border:0;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .subseg button.active{background:var(--navy);color:#fff;font-weight:600}
  table.master{font-size:11.5px}
  table.master td.mc{text-align:center;padding:2px 4px;border-radius:0}
  table.master tr.proj{cursor:pointer}
  table.master tr.proj:hover td{background:#f3f6fb}
  table.master tr.rolerow td{color:var(--muted);font-size:11px;background:#fbfcfe}
  table.master td.pname{position:sticky;left:0;background:#fff;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.master tr.proj.open td.pname{font-weight:600}
  .mwrap{overflow:auto;max-height:70vh}
  @media(max-width:640px){.kpi .v{font-size:22px}.prov{display:none}.livewrap .btn{display:none}}
  /* ---- Director Brief ---- */
  .brief-hd{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:2px 0 14px}
  .brief-hd h1{font-size:22px;margin:0}
  .brief-hd .wk{color:var(--muted);font-size:13px}
  .qnav{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}
  .qnav button{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13px;
    font-weight:600;color:var(--muted);cursor:pointer;text-align:left;line-height:1.3}
  .qnav button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .qnav button .qn{display:block;font-size:11px;font-weight:700;opacity:.65;margin-bottom:1px}
  .insight{padding:11px 2px;border-bottom:1px solid var(--line)}
  .insight:last-child{border-bottom:0}
  .insight .it{font-weight:700;font-size:14px}
  .insight .is{font-size:13px;color:var(--ink);margin:2px 0 3px}
  .insight .ia{font-size:12.5px;color:var(--muted)}
  .insight .ia b{color:var(--navy)}
  details.attn{border:1px solid var(--line);border-radius:9px;margin:7px 0;background:#fff;overflow:hidden}
  details.attn>summary{cursor:pointer;padding:10px 13px;font-size:13.5px;display:flex;gap:9px;align-items:center;list-style:none}
  details.attn>summary::-webkit-details-marker{display:none}
  details.attn>summary::marker{content:""}
  details.attn>summary .nm{font-weight:700}
  details.attn>summary .pb{color:var(--muted);font-weight:400;font-size:12.5px}
  details.attn[open]>summary{border-bottom:1px solid var(--line);background:#f8fafc}
  details.attn .det{padding:11px 13px;font-size:13px}
  details.attn .det .r{margin:0 0 9px}
  details.attn .det .r:last-child{margin-bottom:0}
  details.attn .det .r .a{color:var(--navy)}
  .green-flag{background:var(--greenbg);color:var(--green);border:1px solid #bfe3cb;border-radius:20px;padding:1px 8px;font-size:10.5px;font-weight:700;white-space:nowrap}
  .phbar{display:flex;align-items:center;gap:9px;margin:6px 0}
  .phbar .pl{width:150px;font-size:12.5px;text-align:right;color:var(--ink);flex:none}
  .phbar .track{flex:1;background:#eef1f4;border-radius:6px;height:22px}
  .phbar .fill{height:100%;background:var(--navy2);border-radius:6px;min-width:3px}
  .phbar .pn{font-size:11.5px;color:var(--muted);width:150px;flex:none}
  .progseg{display:flex;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:8px 0}
  .progseg span{display:block;height:100%}
  .blurb{background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:13px;line-height:1.5;margin:4px 0 0}
  .copybtn{background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 11px;font-size:11.5px;font-weight:600;color:var(--navy);cursor:pointer;margin-top:8px}
  .copybtn:hover{background:var(--bg)}
  .tabdiv{display:inline-flex;align-items:center;color:#8aa0bd;font-size:10.5px;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em;padding:0 6px 0 13px;border-left:1px solid rgba(255,255,255,.18);margin-left:6px}
  .winrow{padding:9px 2px;border-bottom:1px solid var(--line);font-size:13px}
  .winrow:last-child{border-bottom:0}
  .winrow .src{color:var(--muted);font-size:11.5px}
  .roundup-ta{width:100%;min-height:420px;font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 14px;resize:vertical}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="brand">
      <h1>ODL Capacity &amp; Performance</h1>
      <div class="sub">Online Digital Learning — project &amp; team capacity planning</div>
    </div>
    <div class="spacer"></div>
    <div class="chip-model" id="modelChip">1 point = 32h · 4 pts/mo = full load</div>
    <div class="prov" id="prov"></div>
  </div>
</header>
<nav class="tabs"><div class="wrap" id="tabbar" role="tablist" aria-label="Dashboard sections"></div></nav>

<main class="wrap">
  <div class="toolbar" id="globalbar">
    <label>Window</label>
    <select id="fromMonth"></select><span class="muted">→</span><select id="toMonth"></select>
    <span class="seg" id="unitSeg"><button data-u="pts" class="active">Points</button><button data-u="hrs">Hours</button></span>
    <span class="spacer" style="flex:1"></span>
    <span class="livewrap">
      <span id="liveBadge" class="pill gray" title="data source">📦 snapshot</span>
      <button class="btn ghost" id="btnRefresh" style="display:none" title="Re-read current numbers (needs the local server)">↻ Refresh</button>
      <button class="btn ghost" id="btnSync" style="display:none" title="Pull the latest from Asana (needs the local server + ASANA_TOKEN)">⟳ Sync Asana</button>
    </span>
  </div>

  <section class="tab" id="tab-brief"></section>
  <section class="tab" id="tab-overview"></section>
  <section class="tab" id="tab-capacity"></section>
  <section class="tab" id="tab-people"></section>
  <section class="tab" id="tab-projects"></section>
  <section class="tab" id="tab-faculty"></section>
  <section class="tab" id="tab-plan"></section>
  <section class="tab" id="tab-recs"></section>
</main>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" tabindex="-1"></aside>

<footer id="foot"></footer>

<script>
"use strict";
// D and the data-derived globals are mutable: boot renders the baked snapshot
// instantly, then a live fetch (/api/data, when served by serve.py) swaps in
// real-time numbers via applyData(). On file:// the fetch fails and we keep the
// baked snapshot — so the single file still works offline.
let D = window.DATA;
// public/redacted build (built with `build.py --public`): no personal names,
// faculty scores or internal links. Hides the Faculty tab + shows a banner.
const PUB = !!(D && D._public);
let MONTHS = D.meta.months;
let PH = D.meta.point_hours, FULL = D.meta.full_monthly_points;
let TODAY = D.meta.today, NOW = TODAY.slice(0,7);
// "Other" is hidden from the team views (director feedback 2026-07-14 — it's ~nothing);
// its hours still roll into Total, so the totals are unchanged.
let SCOPES = D.capacity.scopes.filter(s=>s!=="Other");
// --- source links: every figure should point back to where it came from ---
const SRC=(D.meta&&D.meta.sources)||{};
const CAP_URL=SRC.capacity_sheet||"";
// workspace-scoped Asana base ("…/1/<workspace>") for project + task deep links
const ASANA_WS=SRC.asana_ws||"https://app.asana.com/1/228221773618853";
// Asana "NDL Project Tracking & Awareness" board — where new intake requests become projects
const NDL_BOARD_URL=SRC.ndl_board||(ASANA_WS+"/project/1207871566050072/list/1207871653620573");
function asanaUrl(gid){return gid?((SRC.asana_project_base||"https://app.asana.com/0/")+gid):"";}
function asanaWsProjectUrl(gid){return gid?(ASANA_WS+"/project/"+gid):"";}
function asanaWsTaskUrl(gid){return gid?(ASANA_WS+"/task/"+gid):"";}
function srcTag(href,label){return href?` <a class="src" href="${esc(href)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open the source: ${esc(label)}">${esc(label)} ↗</a>`:"";}
// map a project NAME to its live Asana project gid (only real projects carry one),
// so faculty / department / project rows can link to the actual project, not a home page.
const GID_BY_NAME={};
(D.projects||[]).forEach(p=>{const g=p.asana&&p.asana.gid;if(g){GID_BY_NAME[p.name]=g;if(p.asana.name)GID_BY_NAME[p.asana.name]=g;}});
function asanaProjTag(name){const g=GID_BY_NAME[name];return g?srcTag(asanaUrl(g),"Asana"):"";}
function asanaTaskUrl(gid){return gid?((SRC.asana_project_base||"https://app.asana.com/0/")+(SRC.impact_board||gid)+"/"+gid):"";}
// faculty / department rows come from the Impact Tracker TASK (that's where the
// FSI lives), so link straight to that task; fall back to a project-name match.
function asanaRowTag(row){if(!row)return "";return row.gid?srcTag(asanaTaskUrl(row.gid),"Asana"):asanaProjTag(row.project);}
function top5Link(x){
  // STANDING RULE: any Top-5 / brief item derived from intake tasks MUST carry its
  // Asana link (director's rule) — intake candidates get the NDL board deep link
  // (new tab), guarded for the public build where board_url may be stripped.
  if(x&&x.kind==="intake"){const u=(D.intake&&D.intake.board_url)||NDL_BOARD_URL;return u?{href:u,label:"Open intake board"}:null;}
  if(x&&x.kind==="timesheet")return {tab:"people",label:"See People"};
  if(x&&(x.kind==="overbudget"||x.kind==="phase"))return {tab:"projects",label:"See Projects"};
  if(x&&(x.kind==="crossdept"||x.kind==="green"||x.kind==="hygiene")){
    const u=x.links&&x.links[0]&&x.links[0].url;
    return u?{href:u,label:"Open in Asana"}:{tab:"projects",label:"See Projects"};}
  const t=(x.t+" "+(x.s||"")).toLowerCase();
  if(/person is|people are|\bpeople\b/.test(t))return {tab:"people",label:"See People"};
  if(/recommendation/.test(t))return {tab:"recs",label:"See Recommendations"};
  if(/capacity|headroom|full load/.test(t))return {tab:"capacity",label:"See Capacity"};
  return null;}
let LIVE = false;
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const MON=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function mlab(m){const[a,b]=m.split("-");return MON[+b]+" "+a.slice(2);}
function mlabFull(m){const[a,b]=m.split("-");return MON[+b]+" "+a;}
function esc(s){return (s==null?"":(""+s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function el(tag,attrs,html){const e=document.createElement(tag);if(attrs)for(const k in attrs){if(k==="class")e.className=attrs[k];else if(k==="html")e.innerHTML=attrs[k];else e.setAttribute(k,attrs[k]);}if(html!=null)e.innerHTML=html;return e;}
function clampIdx(i){return Math.max(0,Math.min(MONTHS.length-1,i));}
function nowIdx(){let i=MONTHS.indexOf(NOW);return i<0?Math.max(0,MONTHS.length-9):i;}
function unit(){return state.unit;}
function val(pts){if(pts==null)return null;return state.unit==="hrs"?Math.round(pts*PH):round(pts,2);}
function unitLab(){return state.unit==="hrs"?"h":"pt";}
function round(x,n=2){const f=Math.pow(10,n);return Math.round(x*f)/f;}
function pct(x){return x==null?"—":Math.round(x*100)+"%";}

/* ---------- state ---------- */
const state = {tab:"brief", briefQ:"attention", from:clampIdx(nowIdx()-1), to:MONTHS.length-1,
  unit:"hrs", capScope:"Total", capMode:"summary", peopleMetric:"logged", peopleTeam:"all",
  hoursPrec:"weekly", hoursBy:"person",
  facMode:"dept", masterExpand:{},
  projFilter:{active:true,team:"all",status:"all",q:""}, projSort:{k:"name",dir:1},
  recFilter:{status:"all",category:"all",severity:"all",q:""}, plan:[]};

/* ---------- status persistence (localStorage overlay + export) ---------- */
/* localStorage can be blocked on file:// / opaque origins, so fail safe to an
   in-memory store (edits persist for the session; Export still shares them). */
const MEM={};
let STORAGE_OK=true;
const store={
  get(k){try{return localStorage.getItem(k);}catch(e){STORAGE_OK=false;return (k in MEM)?MEM[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){STORAGE_OK=false;MEM[k]=v;}}
};
const LS = {
  user(){return store.get("odlpm.user")||"";},
  setUser(u){store.set("odlpm.user",u);},
  edit(id){try{return JSON.parse(store.get("odlpm.status."+id)||"null");}catch(e){return null;}},
  setEdit(id,obj){store.set("odlpm.status."+id,JSON.stringify(obj));},
  manual(){try{return JSON.parse(store.get("odlpm.manual")||"[]");}catch(e){return [];}},
  setManual(a){store.set("odlpm.manual",JSON.stringify(a));}
};
// merged recommendation list: baked + locally-added manual, with status overlay
function recs(){
  const baked = D.recommendations.map(r=>Object.assign({},r));
  const ids = new Set(baked.map(r=>r.id));
  const extra = LS.manual().filter(r=>!ids.has(r.id)).map(r=>Object.assign(
    {source:"manual",category:"manual",severity:r.severity||"medium",scope_type:r.scope_type||"global",
     status:"Not Started",owner:"",target_month:"",notes:"",evidence_url:"",first_seen:TODAY},r));
  const all = baked.concat(extra);
  for(const r of all){
    const e = LS.edit(r.id);
    if(e) Object.assign(r,e);
  }
  return all;
}
function saveRec(id,patch){
  const cur = LS.edit(id)||{};
  Object.assign(cur,patch,{updated_at:TODAY,updated_by:LS.user()||cur.updated_by||""});
  LS.setEdit(id,cur);
}

/* ---------- color scales ---------- */
function allocColor(p){ // p = fraction allocated
  if(p==null) return "#eef1f4";
  if(p>1.05) return "#cf3a3a";
  if(p>=0.95) return "#e8913a";
  if(p>=0.70) return "#2f9e57";
  if(p>=0.40) return "#7fb98a";
  return "#cfe3f6";
}
function allocText(p){return (p!=null&&p>0.95)?"#fff":"#13233a";}
function remColor(r,est){ // remaining points; only a truly-missing capacity row is neutral
  if(est==null) return "#eef1f4";
  if(r < -0.01) return "#cf3a3a";
  if(r < 0.5) return "#e8913a";
  if(r <= 2) return "#2f9e57";
  return "#3a78c2";

/* ---------- window helpers ---------- */
function win(){return MONTHS.slice(state.from,state.to+1);}

/* ---------- live data (real-time pull, with offline fallback) ---------- */
function applyData(newData){
  D = window.DATA = newData;
  MONTHS = D.meta.months;
  PH = D.meta.point_hours; FULL = D.meta.full_monthly_points;
  TODAY = D.meta.today; NOW = TODAY.slice(0,7);
  SCOPES = D.capacity.scopes.filter(s=>s!=="Other");
  // the month list can only ever grow at the tail in practice; clamp the window
  // so saved indices stay in range after a refresh.
  state.from = clampIdx(state.from); state.to = clampIdx(state.to);
  if(state.to < state.from) state.to = state.from;
  // drop master-view expansion state for projects no longer present (avoid a
  // renamed→reused name inheriting a stale expanded row, and unbounded growth).
  const liveNames=new Set((D.projects||[]).map(p=>p.name));
  for(const k in state.masterExpand) if(!liveNames.has(k)) delete state.masterExpand[k];
  setLiveBadge();
  buildMonthPickers(); buildTabs(); render();
}
function setLiveBadge(){
  // the Refresh / Sync Asana buttons only work against serve.py -> show them only
  // when we're actually served live; on the published site they stay hidden.
  ["btnRefresh","btnSync"].forEach(id=>{const x=document.getElementById(id);if(x)x.style.display=LIVE?"":"none";});
  const b=$("#liveBadge"); if(!b)return;
  const snap=esc((D.meta.asana_snapshot_date||"").slice(0,10));
  if(LIVE){const t=(D.meta.served_at||"").slice(11,16);
    b.className="pill green"; b.innerHTML="🟢 Live"+(t?" · "+t:"");
    b.title="Recomputed live from the capacity workbook + Asana snapshot ("+snap+"). Click Refresh to re-read.";
  }else{
    b.className="pill gray"; b.innerHTML="📦 Snapshot "+snap;
    b.title="Baked offline snapshot. Run  python3 serve.py  and open the served URL for live numbers.";
  }
}
function timedFetch(url,opts,ms){ // fetch with an AbortController cap (no UI hang)
  const ac=(typeof AbortController!=="undefined")?new AbortController():null;
  const to=ac?setTimeout(()=>ac.abort(),ms):null;
  const o=Object.assign({},opts); if(ac)o.signal=ac.signal;
  return fetch(url,o).finally(()=>{if(to)clearTimeout(to);});
}
function tryLive(force){
  const b=$("#liveBadge"); if(b&&force){b.className="pill amber";b.innerHTML="… fetching";}
  return timedFetch("/api/data"+(force?"?fresh=1":""),{cache:"no-store"},10000)
    .then(r=>{if(!r.ok)throw new Error("http "+r.status);return r.json();})
    .then(j=>{LIVE=true; applyData(j); if(force)toast("Refreshed live ✓");})
    .catch(()=>{LIVE=false; setLiveBadge();
      if(force)toast("Live data needs the local server — run: python3 serve.py");});
}
function syncAsana(){
  if(!LIVE){toast("Start the live server first:  python3 serve.py");return;}
  const btn=$("#btnSync"), b=$("#liveBadge"); if(!btn)return;
  const label=btn.textContent; btn.disabled=true; btn.textContent="⟳ Syncing…";
  if(b){b.className="pill amber";b.innerHTML="… syncing Asana";}
  // generous finite cap (> the server's 900s pull) so a dropped connection can't
  // wedge the button forever; .finally always re-enables it.
  timedFetch("/api/sync",{method:"POST"},960000)
    .then(r=>r.json().then(j=>({ok:r.ok,j})))
    .then(({ok,j})=>{ if(!ok||(j&&j.error)) throw new Error((j&&j.error)||"sync failed");
      applyData(j); toast("Pulled the latest from Asana ✓"); })
    .catch(e=>{ setLiveBadge(); toast("Asana sync failed: "+(e.name==="AbortError"?"timed out":(e.message||e))); })
    .finally(()=>{ btn.disabled=false; btn.textContent=label; });
}
let _toastT=null;
function toast(msg){
  let t=$("#toast"); if(!t){t=el("div",{id:"toast"});document.body.appendChild(t);}
  t.textContent=msg; t.classList.add("show");
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove("show"),4200);
}

function addDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);  // local-field math (toISOString would shift a day east of UTC)
  const z=x=>String(x).padStart(2,"0");return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());}
// whole days from ISO date a to ISO date b (positive when b is later); guarded caller-side
function daysBetween(a,b){if(!a||!b)return null;return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
// muted "Hours from Asana <source> through <date_max>" line + a lapse warning chip when
// the log is >14d stale vs today. Guards every field so the public/redacted build is safe.
function hoursSourceNote(){
  const HL=D.hours_log||{};
  if(!HL.date_max&&!HL.source)return "";
  const srcLab=HL.source==="asana_timesheet"?"Timesheet report":HL.source==="asana_time_entries"?"time entries":"time tracking";
  const dm=HL.date_max||"";
  let html=`<div class="muted small" style="margin-top:6px">Hours from Asana ${esc(srcLab)}${dm?` through ${esc(dm)}`:""}.`;
  const lag=dm?daysBetween(dm,TODAY):null;

    html+=` <span class="pill amber" style="white-space:normal;line-height:1.5">Asana time entry lapsed ${esc(dm)} — hours since then are missing; the dashboard will switch to the Asana Timesheet report automatically when logging resumes.</span>`;
  return html+`</div>`;
}
function weekOf(iso){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()-((d.getDay()+6)%7));
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

function briefDueWithin(days){const lim=addDays(TODAY,days);
  return briefActive().filter(p=>{const d=(p.asana||{}).due_on;return d&&d>=TODAY&&d<=lim;}).length;}

/* per-project attention signals — incl. "green in Asana but carries a risk" */
function briefAttention(){
  const out=[];
  briefActive().forEach(p=>{
    const a=p.asana||{}, st=a.status||p.status_display||"";
    const reasons=[];
    if(st==="On Hold") reasons.push({sev:3,p:"On hold.",a:"Decide whether to resume, rescope, or close it."});
    if(a.due_on && a.due_on<TODAY && st!=="Complete")
      reasons.push({sev:3,p:`Past its Asana due date (${esc(a.due_on)}), still active.`,a:"Confirm a new target date or surface what's blocking it."});
    if((p.unstaffed_points||0)>0.25)
      reasons.push({sev:2,p:`${round(p.unstaffed_points,1)} pts of committed work isn't staffed yet.`,a:"Assign an owner or defer the work."});
    if(p.over_budget&&p.budget_hours&&p.actual_hours!=null)
      reasons.push({sev:2,p:`Over its hour budget — ${Math.round(p.actual_hours)}h logged vs a ${Math.round(p.budget_hours)}h estimate.`,a:"Check scope/timeline and re-estimate the remaining work."});
    if(a.impact_tracker==="Outdated")
      reasons.push({sev:1,p:"Its Asana Impact Tracker is marked outdated.",a:"Refresh the tracker fields."});
    // auto-scanned from the project's latest weekly Asana status update
    const su=p.status;
    if(su&&su.reasons&&su.reasons.length)
      reasons.push({sev:su.level||2,p:`Weekly Asana update flags: ${su.reasons.join("; ")}${su.date?` (as of ${su.date})`:""}.`,a:"Read the weekly update and follow up on the blocker."});
    if(!reasons.length) return;
    reasons.sort((x,y)=>y.sev-x.sev);
    // "unflagged" = a real Asana record that is simply In Progress (Asana has no
    // RAG/health field, so we never claim a color). planOnly = capacity-plan only.
    out.push({name:p.name, reasons, sev:reasons[0].sev,
      unflagged:!!a.gid&&a.status==="In Progress", planOnly:!a.gid});
  });
  out.sort((x,y)=>y.sev-x.sev || y.reasons.length-x.reasons.length || x.name.localeCompare(y.name));
  return out;
}

  else if(ea.n_active&&ea.n_both<Math.max(3,Math.floor(ea.n_active/2)))
    cand.push({w:12,t:"Most active projects have no hour budget to track against",
      s:`Only ${ea.n_both} of ${ea.n_active} active projects have both an Asana hour estimate and logged time.`,
      a:"Add an Estimated time in Asana so budget-vs-actual becomes measurable."});
  // active projects with no phase bucket — they fall out of the congestion view
  const noPhase=briefActive().filter(p=>canonPhase(p.current_phase)==="Other / unspecified");
  if(noPhase.length)
    cand.push({kind:"phase",w:15,t:`${noPhase.length} active project${noPhase.length>1?"s have":" has"} no phase set in Asana`,
      s:`Phase drives the congestion view — ${noPhase.length} active project${noPhase.length>1?"s aren't":" isn't"} counted in any pipeline stage yet.`,
      a:"Set a current phase on each in Asana so pipeline load reads accurately."});
  // hours-log freshness: a stale timesheet means capacity-vs-actual is unreliable
  const HL=D.hours_log||{}, lag=HL.date_max?daysBetween(HL.date_max,TODAY):null;
  if(lag!=null&&lag>14)
    cand.push({kind:"timesheet",w:40,t:`No hours logged since ${HL.date_max} — Asana time entry lapsed`,
      s:`It's been ${lag} days since the last logged hour, so recent capacity-vs-actual reads low because the data is missing, not because work stopped.`,
      a:"Resume Asana time entry; the dashboard switches back to the Timesheet report automatically once logging restarts."});
  const yv=briefYTD();
  cand.push({w:10,t:`${yv.completed} completed and ${yv.started} started so far in ${yv.yr}`,
    s:`${yv.active} projects are active right now${yv.onHold?`, ${yv.onHold} on hold`:""}.`,
    a:"Check the pipeline matches the team's capacity for the rest of the year."});
  const phv=briefPhases().filter(r=>!["On Hold","Maintenance","Other / unspecified"].includes(r.phase));
  if(phv.length){const busiest=phv.slice().sort((a,b)=>b.n-a.n)[0];
    if(busiest.n>=3)cand.push({w:16,t:`${busiest.n} projects are in ${busiest.phase}`,
      s:`That's the most-loaded recorded phase — it typically leans on ${busiest.team}.`,
      a:"Check that team has bandwidth before routing more work there."});}
  if(pAll!=null&&pAll>=0.7&&pAll<=1.05)
    cand.push({w:8,t:`The team is at ${pct(pAll)} of capacity this month`,
      s:`${round(cap.scheduled.Total[m],1)} of ${round(cap.estimated.Total[m],1)} pts scheduled — a healthy load.`,
      a:"Hold steady; watch the months where allocation climbs."});
  cand.sort((x,y)=>y.w-x.w);
  return cand.slice(0,5);
}

/* phase congestion — how many active projects sit in each phase, & which team */
const PHASE_PIPE=["Intake / Discovery","Design","Pre-Production","Production","Post-Production / Build","Build","QA","Launch","Evaluation","Maintenance","On Hold","Other / unspecified"];
const PHASE_TEAM={"Intake / Discovery":"PM + Design","Design":"Learning Designers","Pre-Production":"Design + Media","Production":"Media","Post-Production / Build":"Media + Design","Build":"Design + Media","QA":"Design + Media","Launch":"PM","Evaluation":"PM + Design","Maintenance":"—","On Hold":"—","Other / unspecified":"—"};
function canonPhase(label){
  if(!label)return "Other / unspecified";
  const s=(""+label).toLowerCase();
  if(/hold/.test(s))return "On Hold";
  if(/intake|soap|discovery|analysis|kickoff|charter|scoping/.test(s))return "Intake / Discovery";
  if(/pre-?prod|script/.test(s))return "Pre-Production";
  if(/post-?prod|edit/.test(s))return "Post-Production / Build";
  if(/production|film|shoot|prod\//.test(s))return "Production";
  if(/course map|design/.test(s))return "Design";
  if(/build|develop/.test(s))return "Build";
  if(/qa|quality|accessib/.test(s))return "QA";
  if(/launch|pilot/.test(s))return "Launch";
  if(/eval|retro|impact/.test(s))return "Evaluation";
  if(/mainten|coordination/.test(s))return "Maintenance";
  return "Other / unspecified";
}
function briefPhases(){
  const counts={};
  briefActive().forEach(p=>{const ph=canonPhase(p.current_phase);counts[ph]=(counts[ph]||0)+1;});
  return PHASE_PIPE.filter(ph=>counts[ph]).map(ph=>({phase:ph,n:counts[ph],team:PHASE_TEAM[ph]}));
}
function briefYTD(){
  const yr=TODAY.slice(0,4), ps=D.projects;
  const started=ps.filter(p=>(p.start||"").slice(0,4)===yr).length;
  // "completed" needs a REAL completion signal: asana.last_completed alone is a
  // task-level timestamp that is also set on still-active projects, so require
  // the project to actually be marked Complete first.
  const completed=ps.filter(p=>{const a=p.asana||{};
    const done=(a.status==="Complete")||p.status_display==="Complete";
    if(!done)return false;
    return (a.last_completed||"").slice(0,4)===yr||(p.end||"").slice(0,4)===yr;}).length;
  return {yr,started,completed,active:briefActive().length,
    onHold:briefActive().filter(p=>((p.asana||{}).status)==="On Hold").length,
    due30:briefDueWithin(30),due60:briefDueWithin(60),due90:briefDueWithin(90)};
}
function briefRecsProgress(){
  const all=recs(),by={};all.forEach(r=>by[r.status]=(by[r.status]||0)+1);
  const achieved=by["Achieved"]||0,inprog=by["In Progress"]||0,notst=by["Not Started"]||0,dism=by["Dismissed"]||0;
  const actionable=achieved+inprog+notst;  // same buckets the progress bar renders
  const sevRank={high:0,medium:1,low:2};
  return {total:all.length,achieved,inprog,notst,dism,actionable,pctAchieved:actionable>0?achieved/actionable:0,
    stalled:all.filter(r=>r.status==="Not Started")
      .sort((a,b)=>(sevRank[a.severity]??1)-(sevRank[b.severity]??1)).slice(0,4)};
}
function oneSentence(s){
  s=(""+s).replace(/\s+/g," ").trim();
  if(s.length<=200)return s;
  let m=s.match(/^.*?[.!?](\s|$)/), t=m?m[0].trim():s;
  if(t.length<40){ // first break is likely a false stop on an abbreviation (e.g. "Prof.")
    const m2=s.match(/^.{40,}?[.!?](\s|$)/); if(m2)t=m2[0].trim();
  }
  return t.length>240?t.slice(0,237)+"…":t;
}
function briefWins(){
  const bi=briefInputs(), rn=bi.running_notes||{};
  const shouts=(rn.shoutouts||[]).filter(Boolean);
  const manual=(bi.wins||[]).filter(w=>w&&w.text);
  const derived=[];
  ((D.faculty&&D.faculty.ratings)||[]).filter(r=>r.fsi!=null&&r.fsi>=4.9).sort((a,b)=>b.fsi-a.fsi).slice(0,4)
    .forEach(r=>derived.push({text:`${r.project} earned a faculty satisfaction score of ${r.fsi}/5.`,src:"Faculty Impact Tracker"}));
  const cutoff=addDays(TODAY,-120);
  D.projects.filter(p=>{const a=p.asana||{};
    const done=(a.status==="Complete")||p.status_display==="Complete";
    const lc=(a.last_completed||"").slice(0,10);
    return done&&lc&&lc>=cutoff;})  // only genuinely-completed projects
    .slice(0,4).forEach(p=>derived.push({text:`Wrapped up ${p.name}.`,src:"Asana — recently completed"}));
  return {shouts, shoutDate:rn.meeting_date, manual, derived};
}
// first clean prose sentence from a reflection report (summary is a list of
// paragraphs; skip retrospective metadata/rating boilerplate)
function cleanRefSentence(ref){
  if(!ref)return "";
  let arr=Array.isArray(ref.summary)?ref.summary:(ref.summary?[ref.summary]:[]);
  if(!arr.length&&Array.isArray(ref.takeaways))arr=ref.takeaways;
  const bad=/(project:|date of retrospective|participants:|highlights\s*\/|recommendations;|odl team rating|learning designer -|media producer -|faculty satisfaction index|net promoter score|survey -|memorable quotes|see above|^[-•])/i;
  for(const raw of arr){
    const s=(""+raw).replace(/\s+/g," ").trim();
    if(s.length<30||s.length>320||!/\s/.test(s)||bad.test(s))continue;
    return oneSentence(s);
  }
  return "";
}
function briefRoundup(){
  const out=[],seen=new Set();
  (briefInputs().roundup||[]).filter(x=>x&&x.blurb&&x.project).forEach(x=>{out.push({project:x.project,blurb:x.blurb});seen.add(x.project);});
  const reflBy={};(D.reflections||[]).forEach(r=>{if(r.project)reflBy[r.project]=r;});
  ((D.faculty&&D.faculty.ratings)||[]).filter(r=>r.fsi!=null).sort((a,b)=>b.fsi-a.fsi).slice(0,10).forEach(r=>{
    if(seen.has(r.project))return; seen.add(r.project);
    let blurb=`ODL partnered${r.faculty?` with ${r.faculty}`:""}${r.dept?` (${r.dept})`:""} on ${r.project}`;
    if(r.type)blurb+=`, a ${(""+r.type).toLowerCase()} project`;
    blurb+=".";
    const extra=cleanRefSentence(reflBy[r.project]);
    if(extra)blurb+=" "+extra;
    // NPS here is the Impact Tracker's 0–100 likelihood-to-recommend (not the −100..100 scale)
    if(r.fsi!=null)blurb+=` Faculty rated the experience ${r.fsi}/5${(r.nps!=null&&r.nps>=90)?" and would recommend ODL":""}.`;
    out.push({project:r.project,blurb});
  });
  return out.slice(0,6);
}
function copyBlurb(btn,text){

/* ---- ④ Round-up email draft: a suggested email assembled from the team's
   running notes (shout-outs + updates) and live Asana project activity. The
   composition is deterministic; the user edits the draft and copies it. ---- */
function joinList(arr){arr=(arr||[]).filter(Boolean);
  if(arr.length<=1)return arr[0]||"";
  if(arr.length===2)return arr[0]+" and "+arr[1];
  return arr.slice(0,-1).join(", ")+", and "+arr[arr.length-1];}
// rule-based prose round-up: one short paragraph per topic (shout-outs, wrapped-up,
// in-progress work, team/project updates, celebrations, faculty highlights), in the
// warm newsletter voice of the team's own round-up emails. Editable before sending.
function composeRoundup(){
  const rn=briefInputs().running_notes||{};
  const P=[];
  P.push("Hi all,");
  P.push("It was great to see many of you at our team meeting this week. Here's a round-up of what folks have been up to.");
  // shout-outs — already phrased "<name> for doing <x>"; vary the lead-in
  const THANKS=["A big thank-you to","Shout-out to","Kudos to","Hats off to","Much appreciation to"];
  (rn.shoutouts||[]).filter(Boolean).forEach((s,i)=>{
    s=(""+s).trim().replace(/\.+$/,"");
    P.push((/^(thanks|thank you|shout|kudos|hats off|much appreciation|a big)/i.test(s)?s:`${THANKS[i%THANKS.length]} ${s}`)+".");
  });
  // recently wrapped up
  const shipped=briefWins().derived.filter(w=>/^Wrapped up/.test(w.text))
    .map(w=>w.text.replace(/^Wrapped up /,"").replace(/\.$/,""));
  if(shipped.length)P.push(`The team recently wrapped up ${joinList(shipped)}.`);
  // in-progress work — one sentence per project: "<who> is working on <project> (<phase>)."
  const shippedSet=new Set(shipped);
  const LEADS=["is working on","is making progress on","continues work on","is busy with"];
  const PLEADS=["are working on","are making progress on","continue work on","are busy with"];
  const inprog=briefActive().filter(p=>{const a=p.asana||{},done=(a.status==="Complete")||p.status_display==="Complete";
      return !done&&!shippedSet.has(p.name);})
    .map(p=>{const raw=((p.asana||{}).point_person||(p.asana||{}).owner||"").replace(/\s+/g," ").trim();
      return {name:p.name,phase:canonPhase(p.current_phase),
        people:raw?raw.split(/\s*,\s*/).filter(Boolean):[]};})
    .filter(p=>p.phase!=="Other / unspecified"&&p.phase!=="On Hold").slice(0,10);
  inprog.forEach((p,i)=>{
    const who=p.people.length?joinList(p.people):"The team";
    const verb=(p.people.length>=2?PLEADS:LEADS)[i%4];
    P.push(`${who} ${verb} ${p.name}${p.phase?` (${p.phase.toLowerCase()})`:""}.`);
  });
  // team / project updates from the running notes
  (rn.project_updates||[]).filter(Boolean).forEach(u=>P.push((""+u).trim().replace(/\.$/,"")+"."));
  // faculty highlights
  const fac=((D.faculty&&D.faculty.ratings)||[]).filter(r=>r.fsi!=null&&r.fsi>=4.9)
    .sort((a,b)=>b.fsi-a.fsi).slice(0,2);
  if(fac.length)P.push(`On the faculty front, ${joinList(fac.map(r=>`${r.project} earned ${r.fsi}/5`))} in their post-project feedback.`);
  // celebrations
  const celeb=(rn.celebrations||[]).filter(Boolean);
  if(celeb.length)P.push(`A few celebrations coming up: ${joinList(celeb)}.`);
  P.push("[Add any personal news, travel, conferences, or other happenings here.]");
  P.push("With appreciation,");
  P.push("— [your name]");
  return P.join("\n\n");
}
function briefRoundupView(c){
  const rn=briefInputs().running_notes||{};
  const P=briefPanel("Round-up email — suggested draft",
    "A starting draft pulled together from the team's running notes (shout-outs + updates) and live Asana project activity. Edit it here, then copy — it's a suggestion, so review before sending.");
  const ta=el("textarea",{class:"roundup-ta",rows:"24","aria-label":"Round-up email draft"});
  ta.value=composeRoundup();

function capChart(scope,months){
  const cap=D.capacity;
  const H=210,padL=38,padB=42,padT=10,bw=Math.max(16,Math.min(40,Math.floor(760/months.length)));
  const W=padL+months.length*(bw+8)+10;
  let maxV=0; months.forEach(m=>{maxV=Math.max(maxV,cap.estimated[scope][m]||0,cap.scheduled[scope][m]||0);});
  maxV=Math.max(maxV,1); const sc=v=>(H-padB-padT)*(v/maxV);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px"><g font-size="9" fill="#5b6573">`;
  // gridlines
  for(let g=0;g<=4;g++){const yv=maxV*g/4,y=H-padB-sc(yv);
    svg+=`<line x1="${padL}" y1="${y}" x2="${W-6}" y2="${y}" stroke="#eef1f4"/><text x="${padL-5}" y="${y+3}" text-anchor="end">${state.unit==="hrs"?Math.round(yv*PH):round(yv,0)}</text>`;}
  months.forEach((m,i)=>{
    const x=padL+i*(bw+8)+6;
    const e=cap.estimated[scope][m]||0, s=cap.scheduled[scope][m]||0, pc=cap.pct[scope][m];
    const ey=H-padB-sc(e), sy=H-padB-sc(s);
    svg+=`<rect x="${x}" y="${ey}" width="${bw}" height="${sc(e)}" rx="2" fill="#e7ebf1"/>`;
    svg+=`<rect x="${x}" y="${sy}" width="${bw}" height="${sc(s)}" rx="2" fill="${allocColor(pc)}"><title>${mlabFull(m)}: ${val(s)}/${val(e)} ${unitLab()} allocated (${pct(pc)})</title></rect>`;
    svg+=`<text x="${x+bw/2}" y="${H-padB+12}" text-anchor="middle" transform="rotate(35 ${x+bw/2} ${H-padB+12})">${mlab(m)}</text>`;
    if(m===NOW)svg+=`<rect x="${x-2}" y="${padT}" width="${bw+4}" height="${H-padB-padT}" fill="none" stroke="#ae9142" stroke-dasharray="3 2"/>`;
  });
  svg+=`</g></svg>`;
  const wrap=el("div");wrap.innerHTML=svg;
  const lg=el("div",{class:"legend"});lg.style.marginTop="6px";
  lg.innerHTML=`<span><span class="sw" style="background:#e7ebf1"></span>Capacity (hours)</span><span><span class="sw" style="background:#2f9e57"></span>Allocated (colored by % used)</span><span><span class="sw" style="background:#fff;border:1px dashed #ae9142"></span>current month</span>`;
  wrap.appendChild(lg);return wrap;
}

/* ---- CAPACITY: master view — the full capacity plan, project × month ---- */
function projScopeByMonth(p,scope,months){
  const by={}; let tot=0;
  (p.roles||[]).forEach(r=>{ if(scope!=="Total"&&r.team!==scope)return;
    months.forEach(m=>{const v=(r.alloc&&r.alloc[m])||0; if(v){by[m]=round((by[m]||0)+v,4); tot+=v;}});});
  return {by, tot:round(tot,3)};
}
function masterCell(v){

const HCOLORS=["#4e79a7","#f28e2b","#59a14f","#e15759","#b07aa1","#76b7b2","#d37295","#8a9a2b","#9c755f","#5566c9","#1aa3a3","#c4623d","#7a5ea8","#e6a817"];
// bucket key for a YYYY-MM-DD date at the chosen precision
function hoursPeriodKey(d,prec){
  if(prec==="daily")return d;
  if(prec==="monthly")return d.slice(0,7);                 // YYYY-MM
  const dt=new Date(d+"T00:00:00Z");
  dt.setUTCDate(dt.getUTCDate()-((dt.getUTCDay()+6)%7));    // back to Monday (0=Mon…6=Sun)
  if(prec==="biweekly"){                                    // align to even week from Mon 2024-01-01
    const wk=Math.round((dt.getTime()-Date.UTC(2024,0,1))/(7*864e5));
    if(((wk%2)+2)%2===1)dt.setUTCDate(dt.getUTCDate()-7);
  }
  return dt.toISOString().slice(0,10);
}
function hoursPeriodLabel(k,prec){
  if(prec==="monthly"){const[a,b]=k.split("-");return MON[+b]+" '"+a.slice(2);}
  const p=k.split("-");return MON[+p[1]]+" "+(+p[2]);       // "Jun 2" (day or week-start)
}
function renderHoursLog(c){

  // A departed teammate is hidden from the person/phase lists (their "PM Time

    }

  const winSum=[...winTot.values()].reduce((a,b)=>a+b,0)||1;

  const everyNth=Math.ceil(n/18);
  vis.forEach((pk,i)=>{
    const row=periods.get(pk),x=padL+step*i+(step-bw)/2;let yc=padT+plotH;
    cats.forEach(cat=>{const v=row.get(cat.ci)||0;if(v<=0)return;const hh=sc(v);yc-=hh;
      svg+=`<rect x="${round(x,1)}" y="${round(yc,1)}" width="${round(bw,1)}" height="${round(hh,1)}" fill="${cat.color}"><title>${esc(hoursPeriodLabel(pk,prec))} · ${esc(cat.label)}: ${round(v,1)} h</title></rect>`;});

  if(by!=="total"){

    cats.forEach(cat=>lg.appendChild(el("span",{class:"muted small",style:"display:inline-flex;align-items:center;gap:5px"},
      `<span style="width:11px;height:11px;border-radius:2px;background:${cat.color};display:inline-block"></span>${esc(cat.label)}`)));

  }

  // ---- table: per-category totals over the visible window ----
  const order=cats.filter(cat=>(winTot.get(cat.ci)||0)>0).sort((a,b)=>(winTot.get(b.ci)||0)-(winTot.get(a.ci)||0));
  const head={person:"Person",project:"Project",phase:"Phase",total:"Series"}[by];
  let tb=`<table><thead><tr><th class="nosort">${esc(head)}</th><th class="num nosort">Hours (last ${vis.length})</th><th class="num nosort">Share</th></tr></thead><tbody>`;
  order.forEach(cat=>{const v=winTot.get(cat.ci)||0;
    tb+=`<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${cat.color};margin-right:6px"></span>${esc(cat.label)}</td><td class="num">${round(v,1)}</td><td class="num">${pct(v/winSum)}</td></tr>`;});

  const tcard=el("div",{style:"margin-top:10px"});tcard.innerHTML=tb;c.appendChild(tcard);
  const grain={daily:"days",weekly:"weeks",biweekly:"two-week periods",monthly:"months"}[prec];
  c.appendChild(el("div",{class:"muted small",style:"margin-top:4px"},
    `Most recent ${vis.length} ${grain} with logged time${folded?`; ${by}s beyond the top ${KMAX} are folded into “Other”`:""}. Real Asana time entries, refreshed nightly.`));
}

function filteredProjects(){
  const f=state.projFilter;
  return D.projects.filter(p=>{
    if(f.active&&!p.active)return false;
    if(f.team!=="all"&&!p.roles.some(r=>r.team===f.team))return false;
    if(f.status!=="all"&&p.status_display!==f.status)return false;
    if(f.q&&!p.name.toLowerCase().includes(f.q.toLowerCase()))return false;
    return true;
  });
}
function drawProjTable(){
  const f=state.projFilter,s=state.projSort;
  let list=filteredProjects();
  // "Size" here = the project's effort (points/hours). The qualitative T-shirt
  // size is intentionally not shown — that lives only in the Plan tab's staffing templates.
  const get={name:p=>p.name.toLowerCase(),size:p=>p.size_h||0,
    status:p=>p.status_display,start:p=>p.first_month||"",end:p=>p.last_month||""};
  list.sort((a,b)=>{const g=get[s.k]||get.name;const x=g(a),y=g(b);return (x<y?-1:x>y?1:0)*s.dir;});
  $("#projCount").textContent=`${list.length} of ${D.projects.length}`;
  const cols=[["name","Project"],["size","Size","num"],["status","Status"],["start","First"],["end","Last"],["phase","Phase"]];
  let head=cols.map(([k,l,cl])=>`<th class="${cl||""} ${k==="phase"?"nosort":""}" data-k="${k}" title="${k==="phase"?"":"Click to sort by "+l}">${l}${s.k===k?(s.dir>0?" ▲":" ▼"):(k==="phase"?"":' <span style="opacity:.4">↕</span>')}</th>`).join("");
  let rows="";
  list.forEach((p,i)=>{
    rows+=`<tr class="clickable" data-i="${i}"><td><b>${esc(p.name)}</b></td>
      <td class="num" title="hours from Asana (logged, else estimated; blank = not scoped)">${p.size_h!=null?Math.round(p.size_h)+"h":'<span class="muted">—</span>'}</td>
      <td><span class="pill ${projStatusPill(p.status_display)}">${esc(p.status_display)}</span></td>
      <td>${p.first_month?mlab(p.first_month):"—"}</td><td>${p.last_month?mlab(p.last_month):"—"}</td>
      <td class="muted">${esc(p.current_phase||"—")}</td></tr>`;
  });
  const bd=$("#projTableBd");
  bd.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
  // keep the toolbar Sort controls in sync with header-click sorting
  const ss=$("#projSortSel"); if(ss&&ss.value!==s.k)ss.value=s.k;
  const db=$("#projSortDir"); if(db)db.innerHTML=s.dir>0?"▲ Asc":"▼ Desc";
  bd.querySelectorAll("th[data-k]").forEach(th=>{if(th.classList.contains("nosort"))return;
    th.onclick=()=>{const k=th.getAttribute("data-k");if(s.k===k)s.dir*=-1;else{s.k=k;s.dir=1;}drawProjTable();};});
  bd.querySelectorAll("tr[data-i]").forEach(tr=>tr.onclick=()=>openProject(list[+tr.getAttribute("data-i")]));
}
function projStatusPill(s){return /complete/i.test(s)?"green":/progress|active/i.test(s)?"blue":/hold/i.test(s)?"amber":/upcoming/i.test(s)?"navy":"gray";}
function openProject(p){
  const a=p.asana||{};
  const months=MONTHS.filter(m=>(p.first_month&&m>=p.first_month&&p.last_month&&m<=p.last_month));
  if(!months.length)months.push(...win());
  let body=`<div class="kv">
    <div class="k">Status</div><div><span class="pill ${projStatusPill(p.status_display)}">${esc(p.status_display)}</span> ${a.current_phase?`· ${esc(a.current_phase)}`:""}</div>
    <div class="k">Type</div><div>${esc(p.type||a.project_type||"—")}</div>
    <div class="k">Project size</div><div>${p.size_h!=null?`<b>${Math.round(p.size_h)} h</b> <span class="muted">— ${esc(p.size_src)}</span>`:`<span class="muted">— · ${esc(p.size_src||"not scoped")}</span>`}</div>
    <div class="k">Window</div><div>${p.first_month?mlabFull(p.first_month):"—"} → ${p.last_month?mlabFull(p.last_month):"—"}</div>
    ${a.faculty?`<div class="k">Faculty</div><div>${esc(a.faculty)}</div>`:""}
    ${a.dept?`<div class="k">Department</div><div>${esc(a.dept)}</div>`:""}
    ${a.point_person?`<div class="k">Point person</div><div>${esc(a.point_person)}</div>`:""}
    ${a.impact_tracker?`<div class="k">Impact tracker</div><div><span class="pill ${a.impact_tracker==='Outdated'?'red':'green'}">${esc(a.impact_tracker)}</span></div>`:""}
    <div class="k">Asana</div><div>${p.asana&&a.gid?`<a class="src" href="${esc(asanaUrl(a.gid))}" target="_blank" rel="noopener">Open in Asana ↗</a>`:`<span class="muted">not matched to a live Asana project</span>`}</div>
    ${(function(){const rf=reflectionsFor(p.name);return rf.length?`<div class="k">Reflection</div><div>${rf.map(r=>`<a href="${esc(r.doc_url||r.drive_url||r.rel)}" target="_blank" rel="noopener">📄 ${esc(r.type)}</a>`).join(" · ")}</div>`:"";})()}
  </div>`;
  // phase gantt
  if(p.phases&&p.phases.length){
    body+=`<h3 style="margin:14px 0 6px">Phase timeline</h3>`;
    const segs=p.phases; const colors=["#0c2340","#13315c","#3a78c2","#1f9d57","#ae9142","#9a6206","#8a5cf0"];
    // colour by phase LABEL so a repeated phase is the same colour everywhere
    const labColor={}; let ci=0;
    segs.forEach(ph=>{if(!(ph.label in labColor)){labColor[ph.label]=colors[ci%colors.length];ci++;}});
    body+=`<div class="gantt">`;
    segs.forEach((ph,i)=>{const next=segs[i+1]?segs[i+1].month:(p.last_month||ph.month);
      const w=Math.max(1,monthsBetween(ph.month,next));
      body+=`<div class="seg" style="flex:${w};background:${labColor[ph.label]}" title="${esc(ph.label)} — ${mlabFull(ph.month)}"></div>`;});
    body+=`</div>`;
    // labels go in a readable legend below the bar (one row per distinct phase)
    const legSeen={}, legItems=[];
    segs.forEach(ph=>{if(!legSeen[ph.label]){legSeen[ph.label]=1;legItems.push(ph);}});
    body+=`<div class="gantt-legend">`+legItems.map(ph=>
      `<span class="gl"><span class="gsw" style="background:${labColor[ph.label]}"></span>${esc(ph.label)} <span class="gm">${esc(mlab(ph.month))}</span></span>`).join("")+`</div>`;
    body+=`<div class="muted small" style="margin-top:6px">${esc(p.first_month?mlabFull(p.first_month):"")} → ${esc(p.last_month?mlabFull(p.last_month):"")}</div>`;
  }
  // staffing grid
  body+=`<h3 style="margin:16px 0 6px">Staffing &amp; monthly allocation (${unit()==="hrs"?"hours":"points"})</h3>`;
  const useM=months.filter(m=>p.roles.some(r=>r.alloc[m]));
  body+=`<div style="overflow:auto"><table class="hm"><tr><td class="rowlab">Role / person</td>${useM.map(m=>`<td class="mhdr">${mlab(m)}</td>`).join("")}</tr>`;
  p.roles.forEach(r=>{
    body+=`<tr><td class="rowlab">${esc(r.role)} <span class="muted">${esc(r.person||(r.generic?"unassigned":""))}</span></td>`;
    useM.forEach(m=>{const v=r.alloc[m];body+=`<td><div class="mcell" style="background:${v?'#e7f0fb':'#f8fafc'}">${v?val(v):""}</div></td>`;});
    body+=`</tr>`;
  });
  body+=`</table></div>`;
  drawer(p.name,`<span class="pill ${projStatusPill(p.status_display)}">${esc(p.status_display)}</span>`,body);
}
function monthsBetween(a,b){const[ay,am]=a.split("-").map(Number),[by,bm]=b.split("-").map(Number);return (by-ay)*12+(bm-am);}

    card.innerHTML=`<div class="rhd"><span class="ico">🗓️</span>
       <div style="flex:1"><div class="rtitle">${y.year}</div>
         <div class="rmeta"><span>${y.n} project${y.n>1?'s':''}${deptLab}</span> ${chips}</div></div>
       ${fsiPill} <span class="pill navy">${y.year}</span></div>

/*  Plan tab = archetype hour ranges (estimator calibration) + current team    */

function fmtH(x){return (x==null)?"—":Math.round(x)+"h";}
function archRange(a){
  if(a.p25!=null&&a.p75!=null)return `${fmtH(a.p25)}–${fmtH(a.p75)}`;   // interquartile
  if(a.values&&a.values.length)return a.values.map(v=>Math.round(v)+"h").join(" / ");
  if(a.min!=null&&a.max!=null)return `${fmtH(a.min)}–${fmtH(a.max)}`;
  return a.p50!=null?fmtH(a.p50):"—";
}
function fmtWk(x){return x==null?"—":(Math.round(x*10)/10)+" wk";}
function dShort(iso){if(!iso)return "—";const[y,m,d]=iso.split("-");return MON[+m]+" "+(+d)+", "+y;}
function renderPlan(){
  const c=$("#tab-plan"); c.innerHTML="";
  const PM=D.plan_model;
  if(!PM||!PM.archetypes||!PM.archetypes.length){
    c.appendChild(el("div",{class:"note"},"The Plan tool needs the estimator's calibration file (calibration.json), which isn't in this snapshot. It reappears once the estimator's derived data is present."));
    return;
  }
  c.appendChild(el("div",{class:"note"},`ODL runs as a studio serving faculty: what limits intake is rarely raw hours — it's how many builds the team can hold <b>in flight at once</b>, and whether the calendar leaves enough <b>runway before a launch target</b>. This tab answers both from real completed projects. <span class="src">Source: ${esc(PM.source)}</span>`));

  // ---- 1) room to take on more — by capacity hours (director feedback 2026-07-14:
  //      show a capacity→size picture from free hours, not raw in-flight counts) ----
  const conc=PM.concurrency||{};
  const av0=PM.availability||{}, availTeams=Object.keys(av0).filter(t=>t!=="Intern");
  const freeTotal=availTeams.reduce((s,t)=>s+(av0[t].total||0),0);
  const nMon=(PM.avail_months||[]).length;
  const un=PM.unclassified_active||{};
  const sp=el("div",{class:"panel"});
  sp.innerHTML=`<div class="hd"><h2>Room to take on more — by capacity hours</h2><div class="desc">Free (unallocated) staff-hours over the next ${nMon} months ÷ the calibrated effort per project size. "Running now" is what's actually in flight today, as a reality check.</div></div>`;
  const sbd=el("div",{class:"bd"});
  let st=`<div style="font-weight:600;margin-bottom:8px">Free staff-hours, next ${nMon} months: ≈ ${fmtH(freeTotal)}${availTeams.length?` <span class="muted">(${availTeams.map(t=>esc(t)+" "+fmtH(av0[t].total)).join(" · ")})</span>`:""}</div>`;
  st+=`<table><thead><tr><th class="nosort">Size</th><th class="nosort">Project type</th><th class="num nosort">Typical effort</th><th class="num nosort">Running now</th><th class="num nosort">Fits in free hours*</th></tr></thead><tbody>`;
  PM.archetypes.forEach(a=>{
    const k=conc[a.key]||{};
    const fits=(a.p50&&freeTotal)?Math.floor(freeTotal/a.p50):null;
    st+=`<tr><td>${esc(a.tier||"")}</td><td><b>${esc(a.label)}</b></td><td class="num">${a.p50==null?"—":fmtH(a.p50)}</td><td class="num">${k.now==null?"—":k.now}</td><td class="num muted">${fits==null?"—":"≤ "+fits}</td></tr>`;
  });
  st+=`</tbody></table>`;
  sbd.innerHTML=st;
  sbd.appendChild(el("div",{class:"note",style:"border-color:#e0cf9a;background:#fdf6e3;margin-top:10px"},`⚠ Read "fits" as a ceiling, not a plan. It spends all free hours on one size, ignores which team each project leans on, and — most important — logged staff-hours under-count real effort (PM time isn't fully logged${un.n?`, and ${un.n} active project${un.n>1?"s aren't":" isn't"} classified yet`:""}), so the counts run high. A real plan is a <b>mix</b> of sizes; the <b>Running now</b> column and the <b>Book-by dates</b> below are the trustworthy guide.`));
  sp.appendChild(sbd); c.appendChild(sp);

  // ---- 2) book-by dates against real semester launch targets ----
  const lt=PM.lead_times||{}, tg=lt.targets||[], lrows=lt.rows||[];
  if(lrows.length){
    const bp=el("div",{class:"panel"});
    bp.innerHTML=`<div class="hd"><h2>Book-by dates — is there still runway?</h2><div class="desc">Start-by = the launch target minus the type's typical (median) start-to-launch span from completed projects; "safe" uses the slower 75th percentile. When a request arrives after its start-by date, the honest answers are a scope cut or the next semester.</div></div>`;
    const bbd=el("div",{class:"bd"});
    let bt=`<table><thead><tr><th class="nosort">Project type</th><th class="num nosort">Typical span</th>${tg.map(t=>`<th class="nosort">${esc(t.label)}</th>`).join("")}</tr></thead><tbody>`;
    lrows.forEach(r=>{
      bt+=`<tr><td><b>${esc(r.label)}</b></td><td class="num">${fmtWk(r.weeks_p50)}</td>`;
      tg.forEach(t=>{
        const b=(r.by||{})[t.key];
        if(!b){bt+=`<td class="muted">—</td>`;return;}
        const col=b.verdict==="late"?"var(--red)":b.verdict==="tight"?"var(--amber)":"var(--green)";
        const lab=b.verdict==="late"?"already late":b.verdict==="tight"?"start now":"start by "+dShort(b.start_by);
        bt+=`<td><b style="color:${col}">${lab}</b><div class="muted small">safe: ${dShort(b.safe_by)}</div></td>`;
      });
      bt+=`</tr>`;
    });
    bt+=`</tbody></table>`;
    bbd.innerHTML=bt;
    bbd.appendChild(el("div",{class:"muted small",style:"margin-top:6px"},"“Already late” doesn't mean no — it means fewer modules, reused footage, or the next launch target. Use it to reset expectations in the first conversation, not the last one."));
    bp.appendChild(bbd); c.appendChild(bp);
  }

  // ---- 3) capacity runway across the academic year ----
  const wins=PM.windows||[];
  const av=PM.availability||{}, months=PM.avail_months||[];
  const vp=el("div",{class:"panel"});
  vp.innerHTML=`<div class="hd"><h2>Capacity runway across the academic year</h2><div class="desc">Free (unallocated) hours from the Capacity Allocations sheet, cut into the windows that shape ODL's year. Months where the sheet isn't fully filled in yet (few people entered — e.g. 2027) are flagged, because a low "free" there means missing data, not a busy team. Asana carries no forward per-person capacity, so this sheet is the only source.${srcTag(CAP_URL,"capacity sheet")}</div></div>`;
  const vbd=el("div",{class:"bd"});
  if(wins.length){
    const wrap=el("div",{style:"display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:10px;margin-bottom:14px"});
    wins.forEach(w=>{
      const teams=Object.entries(w.free||{}).filter(([t])=>t!=="Intern");
      const incomplete=w.cap_complete===false;
      const card=el("div",{style:`border:1px solid ${incomplete?"#e0cf9a":"var(--line)"};border-radius:8px;padding:10px 12px;background:${incomplete?"#fdf6e3":"var(--bg)"}`});
      card.innerHTML=`<div style="font-weight:700">${esc(w.label)}</div>
        <div class="muted small">${dShort(w.start)} – ${dShort(w.end)} · ${w.weeks} wk</div>
        <div style="font-size:16px;font-weight:700;margin:6px 0 2px">${fmtH(w.free_total)} free</div>
        <div class="muted small">${teams.map(([t,v])=>`${esc(t)} ${fmtH(v)}`).join(" · ")||"—"}</div>
        ${incomplete?`<div class="pill amber" style="margin-top:6px;display:inline-block">⚠ capacity only partly entered${w.roster_n?` — ${w.cap_people||0} of ${w.roster_n} people`:""}</div>`:""}
        <ul class="small" style="margin:8px 0 0;padding-left:16px;color:var(--muted)">${(w.notes||[]).map(n=>`<li>${esc(n)}</li>`).join("")}</ul>`;
      wrap.appendChild(card);
    });
    vbd.appendChild(wrap);
  }
  const teams=Object.keys(av);
  if(!teams.length)vbd.appendChild(el("div",{class:"muted"},"No forward capacity in the sheet yet."));
  else{
    const det=el("details");
    det.innerHTML=`<summary class="muted small" style="cursor:pointer">Month-by-month free hours per team (next ${months.length} months)</summary>`;
    let vt=`<table style="margin-top:8px"><thead><tr><th class="nosort">Team</th>${months.map(m=>`<th class="num nosort">${mlab(m)}</th>`).join("")}<th class="num nosort">Total free</th></tr></thead><tbody>`;
    let colTot={}; let grand=0;

      months.forEach(m=>{const v=av[t].by[m];colTot[m]=(colTot[m]||0)+(v||0);vt+=`<td class="num">${v==null?"—":fmtH(v)}</td>`;});
      grand+=av[t].total||0;
      vt+=`<td class="num"><b>${fmtH(av[t].total)}</b></td></tr>`;
    });
    vt+=`<tr style="font-weight:700;border-top:2px solid var(--line)"><td>All teams</td>${months.map(m=>`<td class="num">${fmtH(colTot[m]||0)}</td>`).join("")}<td class="num">${fmtH(grand)}</td></tr>`;
    vt+=`</tbody></table>`;
    const tb=el("div",{html:vt}); det.appendChild(tb); vbd.appendChild(det);
    vbd.appendChild(el("div",{class:"muted small",style:"margin-top:8px"},"Free hours are before reactive work — semester-start support, quick fixes, consults — so don't plan them to zero."));
  }
  vp.appendChild(vbd); c.appendChild(vp);

  // ---- 4) cost & timeline reference per project type ----
  const ap=el("div",{class:"panel"});
  ap.innerHTML=`<div class="hd"><h2>How long a typical project takes</h2><div class="desc">Start-to-launch calendar span and the ODL-staff effort (hours) per project type, calibrated from real completed projects (full lifecycle). Range = middle 50% (25th–75th percentile) where we have enough projects, otherwise the individual values. ${esc(PM.note||"")}</div></div>`;
  const abd=el("div",{class:"bd"});
  let at=`<table><thead><tr><th class="nosort">Size</th><th class="nosort">Project type</th><th class="num nosort">Typical hours</th><th class="num nosort">Usual range</th><th class="num nosort">Typical timeline</th><th class="num nosort">Projects</th><th class="nosort">Examples</th></tr></thead><tbody>`;
  PM.archetypes.forEach(a=>{

function renderRecs(){
  const c=$("#tab-recs"); c.innerHTML="";
  const all=recs().filter(r=>!/^capacity-/.test(r.category));  // capacity recs now live on the People tab
  c.appendChild(el("div",{class:"note",style:"border-color:#cdd9ea;background:#eef4fc"},
    `<b>Ways we can improve our workflow and process.</b> Pulled from what faculty told us in their reflection reports and from how projects are tracked. (Capacity recommendations — who's over- or under-utilised — now live on the <b>People</b> tab.) Click an item to read the detail — and when the team acts on it, mark it <b>In progress</b> or <b>Done</b> and jot a note. Your marks save in this browser; use <b>Save our progress</b> to share the file with the team. The reflection reports are listed at the bottom.`));
  // progress + save (the only controls — keep it simple)
  const acted=all.filter(r=>r.status==="In Progress"||r.status==="Achieved").length;
  const done=all.filter(r=>r.status==="Achieved").length;
  const bar=el("div",{class:"toolbar"});
  bar.appendChild(el("div",{style:"font-size:13px",html:`<b style="color:var(--green)">${done}</b> done · <b style="color:var(--blue)">${acted-done}</b> in progress · <b>${all.length-acted}</b> to do`}));
  const sp=el("span");sp.style.flex="1";bar.appendChild(sp);
  const save=el("button",{class:"btn ghost",title:"Download everyone's marks + notes as statuses.json to share / commit next to the dashboard"},"Save our progress ↓");save.onclick=exportStatuses;bar.appendChild(save);
  const load=el("button",{class:"btn ghost",title:"Load a shared statuses.json into this browser"},"Load ↑");load.onclick=importStatuses;bar.appendChild(load);
  c.appendChild(bar);
  if(!STORAGE_OK)c.appendChild(el("div",{class:"note",style:"border-color:#f1d3d3;background:#fdf0f0"},`⚠ This browser is blocking local storage (common when opening the file directly) — your marks won't survive a reload, so <b>Save our progress</b> before closing, or open the dashboard from Canvas / the live server.`));
  // group by theme so it reads as "here's what to improve", ordered most-actionable first
  const ORDER=["capacity-person","capacity-team","capacity-unstaffed","faculty-feedback","post-project","on-hold","calibration","data-hygiene","data-quality","manual"];
  const SEV={high:0,medium:1,low:2};
  const groups={};
  all.forEach(r=>{(groups[r.category]=groups[r.category]||[]).push(r);});
  Object.keys(groups).sort((a,b)=>{const ai=ORDER.indexOf(a),bi=ORDER.indexOf(b);return (ai<0?99:ai)-(bi<0?99:bi);}).forEach(cat=>{
    const items=groups[cat].sort((a,b)=>(SEV[a.severity]-SEV[b.severity])||a.title.localeCompare(b.title));
    c.appendChild(el("h3",{class:"rec-group"},`${CATICON[cat]||"•"} ${esc(CATLABEL[cat]||cat)} <span class="muted" style="font-weight:400;font-size:13px">· ${items.length}</span>`));
    items.forEach(r=>c.appendChild(recCard(r)));
  });
  renderKeyConsiderations(c);   // key considerations for future projects, pulled from the reports
  renderReflections(c);   // the reflection reports & surveys the faculty items draw on
}

  // ---- synthesized themes + "are we making progress?" ----
  if(themes.length){
    const recur=rc.themes_recurring||0;
    c.appendChild(el("div",{class:"note",style:"border-color:#cdd9ea;background:#eef4fc",html:
      `We read the reports and grouped their lessons into <b>${themes.length} recurring themes</b> (below). <b>${recur}</b> still show up in reports from the last few months (latest report ${esc(rc.reports_newest||"—")}) — lessons we keep re-learning and haven't fully turned into process yet. ${rc.folder_url?`<a class="src" href="${esc(rc.folder_url)}" target="_blank" rel="noopener">All reflection reports (Drive) ↗</a>.`:""}`}));

      d.innerHTML=`<summary><span class="nm">${esc(t.theme)}</span> <span class="muted small">· ${t.n} report${t.n>1?"s":""}${t.latest?", most recent "+esc(t.latest):""}</span> ${badge}</summary><div class="det"><p style="margin:6px 0">${esc(t.what_it_means)}</p><div class="muted small">Raised in: ${reps}</div></div>`;
